### tmux config ###

### Basic options

set -g escape-time 1
set -g mouse on
set -g status-keys emacs
set -g renumber-windows

# Use tmux terminfo to display italic font and undercurl correctly.
# Check commands:
#   - italic ... echo -e "\e[3mitalic\e[0m"
#   - undercurl ... echo -e "\e[4:3mundercurl"
# In the case they don't work, we can build tmux terminfo by hand.
# For example, follow the below steps on macOS.
#   1. brew install ncurses
#   2. /opt/homebrew/opt/ncurses/bin/infocmp tmux-256color > ~/tmux-256color.info
#   3. Edit tmux-256color.info manually to display undercurl in Neovim (0.9.4).
#     - Add `Smulx=\E[4\:%p1%dm,` to the end of the line starting with `smkx=...` .
#       https://zenn.dev/yushin_hirano/articles/e4aae8a7913f6a
#   4. tic -xe tmux-256color ~/tmux-256color.info
#     - This creates ~/.terminfo directory
set -g default-terminal "tmux-256color"

# Tell tmux about some terminals' features that tmux cannot detect automatically.
set -ga terminal-features ",alacritty:RGB,alacritty:usstyle"
set -ga terminal-features ",foot:RGB,foot:usstyle"

set -g status-position bottom
set -g status-interval 2

### Keybind settings

unbind C-b

if-shell '[ -n "$SSH_CLIENT" ]' {
    set -g prefix C-t
} {
    set -g prefix C-q
}

# Disable the `next-layout` shortcut since I sometimes accidentally change the layout by this.
unbind Space

bind R source-file ~/.tmux.conf \; display "Config reloaded."

# Toggle mouse mode. If the mode is on, we can't
# copy from the terminal screen using mouse..
bind m set -g mouse

### Keybind: Window management

# Open a split that reconnects the new pane to the same host when the current
# pane is an ssh session started via bin/ssh (which records it in @ssh_cmd).
# #{pane_current_path}/#{@ssh_cmd} resolve against the source pane before the
# split; $pane targets the new pane after. `|| true` suppresses the non-zero
# exit warning when the source pane is not an ssh session.
%hidden ssh_split='f() {'\
'   pane=$(tmux split-window "$@" -c "#{pane_current_path}" -P);'\
'   cmd="#{@ssh_cmd}";'\
'   [ -n "$cmd" ] && tmux send-keys -t "$pane" "$cmd" Enter || true;'\
'}; f'

bind i run-shell "$ssh_split -h"
bind | run-shell "$ssh_split -h"
bind - run-shell "$ssh_split -v"
bind u run-shell "$ssh_split -v"
bind c new-window -c "#{pane_current_path}"
bind v run-shell "$ssh_split -v -l 30%"
bind V run-shell "$ssh_split -h -l 36%"
bind o new-window -c "#{pane_current_path}"
bind C-o new-window -c "#{pane_current_path}"

bind < swap-window -t -1 \; previous-window
bind > swap-window -t +1 \; next-window
# swap-pane is mapped to { and } by default.

bind C-n next-window
bind C-p previous-window

bind T choose-tree -Zw
bind Enter resize-pane -Z
bind C-Enter resize-pane -Z

### Keybind: Navigation

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind C-h select-pane -L
bind C-j select-pane -D
bind C-k select-pane -U
bind C-l select-pane -R
bind H select-pane -R \; resize-pane -Z
bind J select-pane -D \; resize-pane -Z
bind K select-pane -U \; resize-pane -Z
bind L select-pane -L \; resize-pane -Z

# Jump to an arbitrary pane in all sessions.
bind P run-shell "tmux display-popup -w80% -h80% -E 'tmuxx panes --fzf'"
bind / run-shell "tmux display-popup -w80% -h80% -E 'tmuxx sessions --fzf'"

bind "'" last-window
bind "C-'" last-window
# Jump to the last session.
bind ',' switch-client -l
bind 'C-,' switch-client -l

### Keybind: Pane resizing

bind = switch-client -T eq
bind -T eq w resize-pane -x 50%
bind -T eq h resize-pane -x 50%

bind r switch-client -T resize
bind -T resize -r h resize-pane -L 3
bind -T resize -r j resize-pane -D 1
bind -T resize -r k resize-pane -U 1
bind -T resize -r l resize-pane -R 3
bind -T resize v resize-pane -y 36%
bind -T resize V resize-pane -x 30%

### Keybind: Copy mode

# Use Vi-like keybindings in copy-mode
set-window-option -g mode-keys vi

bind -T copy-mode-vi v send-keys -X rectangle-off \; send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-on \; send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
bind -T copy-mode-vi K send-keys -N 2 -X scroll-up
bind -T copy-mode-vi J send-keys -N 2 -X scroll-down
bind -T copy-mode-vi C-k send-keys -X previous-prompt
bind -T copy-mode-vi C-j send-keys -X next-prompt
bind -T copy-mode-vi Escape send-keys -X cancel # default is clear-selection

# Search incrementally.
bind -T copy-mode-vi / command-prompt -i -I "#{pane_search_string}" -T search -p "/" {
    send-keys -X search-forward-incremental "%%"
}
bind -T copy-mode-vi ? command-prompt -i -I "#{pane_search_string}" -T search -p "?" {
    send-keys -X search-backward-incremental "%%"
}
# Scroll up and down smoothly.
bind -T copy-mode-vi C-u run-shell 'for i in {1..8}; do tmux send-keys -N 2 -X scroll-up; sleep 0.003; done'
bind -T copy-mode-vi C-d run-shell 'for i in {1..8}; do tmux send-keys -N 2 -X scroll-down; sleep 0.003; done'
bind -T copy-mode-vi C-b run-shell 'for i in {1..12}; do tmux send-keys -N 3 -X scroll-up; sleep 0.003; done'
bind -T copy-mode-vi C-f run-shell 'for i in {1..12}; do tmux send-keys -N 3 -X scroll-down; sleep 0.003; done'

### Styling

# Everforest color palette.
# https://github.com/sainnhe/everforest/tree/master
%hidden bg0="#2d353b"
%hidden bg1="#343f44"
%hidden bg2="#3d484d"
%hidden bg4="#4f585e"
%hidden bg_yellow="#4d4c43"
%hidden bg_red="#514045"
%hidden bg_green="#425047"
%hidden bg_blue="#3a515d"
%hidden white="#d3c6aa" # fg
%hidden yellow="#dbbc7f"
%hidden red="#e67e80"
%hidden green="#a7c080"
%hidden blue="#7fbbb3"
%hidden grey0="#7a8478"
%hidden grey2="#9da9a0"

set -g mode-style "fg=$white,bg=$bg_red"
set -g message-style "fg=$white,bg=$bg_blue"

set -g copy-mode-match-style "fg=$bg0,bg=$green"
set -g copy-mode-current-match-style "fg=$bg0,bg=$red"

set -g pane-border-status top
set -g pane-border-style fg="$bg_blue"
set -g pane-active-border-style "fg=$blue"

set -g status-style "fg=$white,bg=$bg1"

set -g window-status-bell-style "none"

# Job status

# Each pane's state is stored in its own @job_status user option (written by `tmuxx job-status`, see bin/tmuxx).
# `#{P:}` expands its body once per pane of the window being drawn.
# We derive per-window / per-session / total states from those per-pane statuses.
# The pane statuses are joined into one string and pattern-matched with `#{m:}`.
%hidden deco="â”„ â”„ â”„"
%hidden job_pane=\
"#{?#{==:#{@job_status},running},#[fg=$yellow]$deco â–¶ running $deco,}"\
"#{?#{==:#{@job_status},blocked},#[fg=$red]$deco âŹ¸ blocked $deco,}"\
"#{?#{==:#{@job_status},done},#[fg=$green]$deco âś“ done $deco,}"

# Roll panes up to a window state by priority: blocked > running > done.
%hidden job_win=\
"#{?#{m:*blocked*,#{P:#{@job_status} }},#[fg=$red] âŹ¸,"\
"#{?#{m:*running*,#{P:#{@job_status} }},#[fg=$yellow] â–¶,"\
"#{?#{m:*done*,#{P:#{@job_status} }},#[fg=$green] âś“,}}}"

# Same priority rollup, but emits a background tint (nothing when no job, so the base bg shows).
%hidden job_bg=\
"#{?#{m:*blocked*,#{P:#{@job_status} }},#[bg=$bg_red],"\
"#{?#{m:*running*,#{P:#{@job_status} }},#[bg=$bg_yellow],"\
"#{?#{m:*done*,#{P:#{@job_status} }},#[bg=$bg_green],}}}"

# Count job statuses of all sessions with `#{n:}`.
# Use `#{?...}` to hide a zero category which treats "0" as false.
%hidden job_all_b="#{n:#{S:#{W:#{P:#{?#{==:#{@job_status},blocked},b,}}}}}"
%hidden job_all_r="#{n:#{S:#{W:#{P:#{?#{==:#{@job_status},running},r,}}}}}"
%hidden job_all_d="#{n:#{S:#{W:#{P:#{?#{==:#{@job_status},done},d,}}}}}"
%hidden job_all="#{?$job_all_b,#[fg=$red]âŹ¸ $job_all_b ,}#{?$job_all_r,#[fg=$yellow]â–¶ $job_all_r ,}#{?$job_all_d,#[fg=$green]âś“ $job_all_d ,}"

# Display a job status in a pane header.
set -g pane-border-format "#{?@job_status, #P: $job_pane#[default] ,}"

# Status right

set -g status-right \
"$job_all #[fg=$grey2,bg=$bg_blue] î‚  #(cd #{pane_current_path} && git branch --show-current 2>/dev/null || echo '-') "\
"#{?pane_in_mode,#[fg=$bg_red#,bg=$red#,bold] #{pane_mode} ,}"
set -g status-right-length 100

# Status left

set -g status-left-length 120
set -g status-left "#[fg=$blue,bg=$bg4]#{?client_prefix,#[fg=$yellow],} #S #[bg=$bg1] "

set -g window-status-separator "  "
set -g window-status-style "fg=$grey2,bg=$bg1"

set -g window-status-format \
"#{?window_last_flag,#[fg=$white#,bg=$bg4],#[fg=$grey2#,bg=$bg_blue]} #I #[fg=$grey2,bg=$bg1]$job_bg"\
" #{pane_current_command}#[fg=$grey0]@#[fg=$grey2]#{b:pane_current_path}#[fg=$grey0]/"\
"#[bg=$bg1]$job_win"\
"#[fg=$grey2,bg=$bg1] #{?window_bell_flag,đź”” ,}#{?window_zoomed_flag,[Z] ,}"

set -g window-status-current-format \
"#[fg=$bg_blue,bg=$blue,bold] #I #[fg=$white,bg=$bg1,nobold]$job_bg"\
" #{pane_current_command}#[nobold,fg=$grey0]@#[fg=$white,bold]#{b:pane_current_path}#[fg=$grey0,nobold]/"\
"#[bg=$bg1]$job_win"\
"#[fg=$white,bg=$bg1] #{?window_zoomed_flag,[Z] ,}"

# Change the color of current (active) window and inactive windows.
# The colors are aligned with Neovim's everforest colorscheme.
# https://github.com/sainnhe/everforest
set -g window-style "bg=#232a2e,fg=$grey0"
set -g window-active-style "bg=$bg0,fg=$white"

set -g popup-border-lines rounded
set -g popup-border-style "fg=$grey0"

### Misc

source-file -q ~/.tmux.local.conf
